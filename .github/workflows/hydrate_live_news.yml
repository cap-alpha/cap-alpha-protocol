name: Live News Hydration

on:
  schedule:
    # Run hourly to capture breaking news and telemetry alerts
    - cron: '0 * * * *'
  workflow_dispatch:
    # Allow manual triggering from the GitHub UI

jobs:
  hydrate_live_news:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          
      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install duckduckgo-search google-generativeai duckdb pandas python-dotenv

      - name: Setup Environment Variables
        run: |
          echo "MOTHERDUCK_TOKEN=${{ secrets.MOTHERDUCK_TOKEN }}" >> $GITHUB_ENV
          echo "GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}" >> $GITHUB_ENV

      - name: Run Live Data Hydration
        run: |
          # Fetch live news, synthesize Intelligence Sentences via Gemini, and push to MotherDuck
          python scripts/hydrate_live_news.py

      - name: Complete
        if: always()
        run: |
          echo "Live Data Hydration execution finished."
