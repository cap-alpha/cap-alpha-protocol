name: Automated ML Flywheel

on:
  schedule:
    # Run every Tuesday at 3:00 AM EST (8:00 AM UTC) to capture complete NFL weekend data
    - cron: '0 8 * * 2'
  workflow_dispatch:
    # Allow manual triggering from the GitHub UI for testing

jobs:
  ml_flywheel:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          
      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r pipeline/requirements.txt
          pip install bs4 lxml selenium

      - name: Setup Chrome and ChromeDriver
        run: |
          sudo apt-get update
          sudo apt-get install -y chromium-browser chromium-chromedriver
          
      - name: Setup Environment Variables
        run: |
          echo "MOTHERDUCK_TOKEN=${{ secrets.MOTHERDUCK_TOKEN }}" >> $GITHUB_ENV
          echo "GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}" >> $GITHUB_ENV
          echo "CHROME_BIN=/usr/bin/chromium-browser" >> $GITHUB_ENV
          echo "CHROMEDRIVER_BIN=/usr/bin/chromedriver" >> $GITHUB_ENV

      - name: Step 1 - Scrape Spotrac & Data Ingestion
        env:
          PYTHONPATH: ${{ github.workspace }}/pipeline:${{ github.workspace }}
        run: |
          # Fetch the latest Cap/Salary data
          python pipeline/src/spotrac_scraper_v2.py team-cap
          python pipeline/src/spotrac_scraper_v2.py player-salaries

      - name: Step 2 - Medallion Bronze/Silver Hydration
        env:
          PYTHONPATH: ${{ github.workspace }}/pipeline:${{ github.workspace }}
        run: |
          # Ensure raw files are pushed directly to MotherDuck MotherDuck Bronze/Silver tables
          python pipeline/src/feature_factory.py

      - name: Step 3 - ML Model Training & Inference (Uncertainty Quantification)
        env:
          PYTHONPATH: ${{ github.workspace }}/pipeline:${{ github.workspace }}
        run: |
          # Train XGBoost with Isolation Forest Uncertainty scoring
          # Scored metrics deduplicated on terminal weeks (R-squared fix)
          python pipeline/src/train_model.py

      - name: Step 4 - Gemini Error Analysis Loop
        env:
          PYTHONPATH: ${{ github.workspace }}/pipeline:${{ github.workspace }}
        run: |
          # Hit the Gemini API to analyze False Positives/Negatives
          python pipeline/src/analyze_model_misses.py
          
      - name: Open Diagnostic Issue (Optional/Future)
        if: always()
        run: |
          echo "Flywheel Execution Complete. In the future, this step will auto-pipe reports to GH Issues."
