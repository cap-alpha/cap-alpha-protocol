name: Automated ML Flywheel

on:
  schedule:
    # Run every Tuesday at 3:00 AM EST (8:00 AM UTC) to capture complete NFL weekend data
    - cron: '0 8 * * 2'
  workflow_dispatch:
    # Allow manual triggering from the GitHub UI for testing

jobs:
  ml_flywheel:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r pipeline/requirements.txt
          pip install bs4 lxml selenium

      - name: Setup Chrome and ChromeDriver
        run: |
          sudo apt-get update
          sudo apt-get install -y chromium-browser chromium-chromedriver

      - name: Step 1 - Scrape Spotrac & Data Ingestion
        continue-on-error: true
        env:
          PYTHONPATH: ${{ github.workspace }}/pipeline:${{ github.workspace }}
          CHROME_BIN: /usr/bin/chromium-browser
          CHROMEDRIVER_BIN: /usr/bin/chromedriver
        run: |
          python pipeline/src/spotrac_scraper_v2.py team-cap
          python pipeline/src/spotrac_scraper_v2.py player-salaries

      - name: Step 2 - Medallion Bronze/Silver Hydration
        env:
          PYTHONPATH: ${{ github.workspace }}/pipeline:${{ github.workspace }}
          GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
          GCP_SERVICE_ACCOUNT_JSON: ${{ secrets.GCP_SERVICE_ACCOUNT_JSON }}
        run: |
          python pipeline/src/feature_factory.py

      - name: Step 3 - ML Model Training & Inference
        env:
          PYTHONPATH: ${{ github.workspace }}/pipeline:${{ github.workspace }}
          GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
          GCP_SERVICE_ACCOUNT_JSON: ${{ secrets.GCP_SERVICE_ACCOUNT_JSON }}
        run: |
          python pipeline/src/train_model.py

      - name: Step 4 - Gemini Error Analysis Loop
        env:
          PYTHONPATH: ${{ github.workspace }}/pipeline:${{ github.workspace }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
          GCP_SERVICE_ACCOUNT_JSON: ${{ secrets.GCP_SERVICE_ACCOUNT_JSON }}
        run: |
          python pipeline/src/analyze_model_misses.py

      - name: Open Diagnostic Issue (Optional/Future)
        if: always()
        run: |
          echo "Flywheel Execution Complete. In the future, this step will auto-pipe reports to GH Issues."
