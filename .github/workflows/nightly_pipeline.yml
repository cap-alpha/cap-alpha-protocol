name: Nightly Data Pipeline & BigQuery Sync

on:
  # Schedule removed — sync_daily.yml is the canonical daily pipeline.
  # Keep workflow_dispatch for manual re-runs or debugging.
  workflow_dispatch:

jobs:
  medallion-pipeline:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install duckduckgo-search google-genai duckdb==1.4.4 pandas python-dotenv feedparser requests praw google-cloud-bigquery pydantic

      - name: Execute Pipeline and Sync to BigQuery
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
          GCP_SERVICE_ACCOUNT_JSON: ${{ secrets.GCP_SERVICE_ACCOUNT_JSON }}
        run: |
          # 1. Run the core transformation layers
          python pipeline/scripts/medallion_pipeline.py
          
          # 2. Push fully sanitized analytics data to BigQuery
          python pipeline/scripts/sync_to_bigquery.py
