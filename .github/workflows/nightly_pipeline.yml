name: Nightly Data Pipeline & BigQuery Sync

on:
  schedule:
    # Run at 08:00 UTC (4:00 AM EDT) every day
    - cron: '0 8 * * *'
  workflow_dispatch:

jobs:
  medallion-pipeline:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r pipeline/requirements.txt

      - name: Execute Medallion Pipeline
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
          GCP_SERVICE_ACCOUNT_JSON: ${{ secrets.GCP_SERVICE_ACCOUNT_JSON }}
          PYTHONPATH: ${{ github.workspace }}/pipeline:${{ github.workspace }}
        run: |
          python pipeline/scripts/medallion_pipeline.py
