name: Daily Data Pipeline

on:
  schedule:
    - cron: '0 9 * * *'  # 9 AM UTC / 5 AM EDT — after overnight API refreshes
  workflow_dispatch:

jobs:
  pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r pipeline/requirements.txt
          pip install \
            google-cloud-bigquery \
            google-auth \
            db-dtypes \
            pandas \
            requests \
            lxml \
            "beautifulsoup4>=4.12" \
            cloudscraper

      - name: Set Environment
        run: |
          echo "GCP_PROJECT_ID=${{ secrets.GCP_PROJECT_ID }}" >> $GITHUB_ENV
          echo "GCP_SERVICE_ACCOUNT_JSON=${{ secrets.GCP_SERVICE_ACCOUNT_JSON }}" >> $GITHUB_ENV
          echo "PYTHONPATH=$GITHUB_WORKSPACE/pipeline:$GITHUB_WORKSPACE" >> $GITHUB_ENV

      # Determine the most recently completed NFL season.
      # Before September → previous calendar year (e.g. March 2026 → 2025).
      # September or later → current calendar year.
      - name: Resolve Season Year
        run: |
          SEASON_YEAR=$(python -c "
          from datetime import datetime
          now = datetime.utcnow()
          print(now.year - 1 if now.month < 9 else now.year)
          ")
          echo "SEASON_YEAR=$SEASON_YEAR" >> $GITHUB_ENV
          echo "Resolved season year: $SEASON_YEAR"

      # Step 1 — PFR: scrape season-level offense + defense stats to local CSV.
      # medallion_pipeline.py reads this file; if it's missing, silver_pfr_game_logs stays empty.
      - name: Step 1 — Scrape PFR Stats
        run: |
          python pipeline/scripts/scrape_pfr.py --year ${{ env.SEASON_YEAR }}
        # Non-fatal: PFR can block scrapers. Gold still builds from OTC data.
        continue-on-error: true

      # Step 2 — Full medallion run:
      #   Bronze: OTC contracts scraped fresh → BigQuery
      #   Silver: contracts, PFR game logs, penalties, team cap normalized → BigQuery
      #   Gold:   fact_player_efficiency built → BigQuery
      - name: Step 2 — Run Medallion Pipeline (Bronze → Silver → Gold)
        run: |
          python pipeline/scripts/medallion_pipeline.py

      # Step 3 — Verify critical tables exist and are non-empty.
      - name: Step 3 — BigQuery Health Check
        run: |
          python pipeline/scripts/sync_to_bigquery.py
