name: Daily Data Sync (2025 Pipeline)

on:
  schedule:
    - cron: '0 8 * * *' # Daily at 3 AM EST (8 AM UTC)
  workflow_dispatch:

jobs:
  sync_data:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          
      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r pipeline/requirements.txt
          pip install bs4 lxml selenium duckdb

      - name: Setup Chrome and ChromeDriver
        run: |
          sudo apt-get update
          sudo apt-get install -y chromium-browser chromium-chromedriver
          
      - name: Setup Environment Variables
        run: |
          echo "MOTHERDUCK_TOKEN=${{ secrets.MOTHERDUCK_TOKEN }}" >> $GITHUB_ENV
          echo "GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}" >> $GITHUB_ENV
          echo "CHROME_BIN=/usr/bin/chromium-browser" >> $GITHUB_ENV
          echo "CHROMEDRIVER_BIN=/usr/bin/chromedriver" >> $GITHUB_ENV

      - name: Step 1 - Execute Full Pipeline for 2025
        run: |
          export PYTHONPATH=$(pwd)
          # Ingest data into DuckDB for 2025
          python pipeline/scripts/medallion_pipeline.py --year 2025
          
          # Scrape Current Season Data
          python pipeline/src/spotrac_scraper_v2.py team-cap
          python pipeline/src/spotrac_scraper_v2.py player-salaries
          python pipeline/src/spotrac_scraper_v2.py player-rankings
          python pipeline/src/spotrac_scraper_v2.py player-contracts
          
          # Ingest data into DuckDB for Current Season
          python pipeline/scripts/medallion_pipeline.pyduck.py
