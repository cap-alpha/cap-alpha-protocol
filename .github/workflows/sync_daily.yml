name: Daily Data Sync (2025 Pipeline)

on:
  schedule:
    - cron: '0 8 * * *' # Daily at 3 AM EST (8 AM UTC)
  workflow_dispatch:

jobs:
  sync_data:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          
      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r pipeline/requirements.txt
          pip install bs4 lxml selenium

      - name: Setup Chrome and ChromeDriver
        run: |
          sudo apt-get update
          sudo apt-get install -y chromium-browser chromium-chromedriver
          
      - name: Step 1a - Scrape Current Season Data (best-effort)
        continue-on-error: true
        env:
          PYTHONPATH: ${{ github.workspace }}/pipeline:${{ github.workspace }}
          CHROME_BIN: /usr/bin/chromium-browser
          CHROMEDRIVER_BIN: /usr/bin/chromedriver
        run: |
          python pipeline/src/spotrac_scraper_v2.py team-cap
          python pipeline/src/spotrac_scraper_v2.py player-salaries
          python pipeline/src/spotrac_scraper_v2.py player-rankings
          python pipeline/src/spotrac_scraper_v2.py player-contracts

      - name: Step 1b - Ingest, Transform, and Sync
        env:
          PYTHONPATH: ${{ github.workspace }}/pipeline:${{ github.workspace }}
          GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
          GCP_SERVICE_ACCOUNT_JSON: ${{ secrets.GCP_SERVICE_ACCOUNT_JSON }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          python pipeline/scripts/medallion_pipeline.py
          python pipeline/src/cryptographic_ledger.py
