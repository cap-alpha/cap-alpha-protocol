name: Data Quality Tests

on:
  push:
    branches: [ main, develop ]
    paths:
      - 'pipeline/src/**'
      - 'pipeline/tests/**'
      - 'data/processed/**'
      - 'pipeline/requirements.txt'
      - '.github/workflows/tests.yml'
  pull_request:
    branches: [ main ]
    paths:
      - 'pipeline/src/**'
      - 'pipeline/tests/**'
      - 'data/processed/**'
      - 'pipeline/requirements.txt'

jobs:
  test:
    name: Run Data Quality Tests
    runs-on: ubuntu-latest
    
    strategy:
      matrix:
        python-version: ['3.10', '3.11']
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v4
      with:
        python-version: ${{ matrix.python-version }}
        cache: 'pip'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r pipeline/requirements.txt
        pip install pytest pytest-cov
    
    - name: Run pytest tests
      run: |
        pytest pipeline/tests/ -v --tb=short --cov=pipeline/src --cov-report=term-missing --cov-report=xml
      env:
        PYTHONPATH: ${{ github.workspace }}/pipeline
    

    
    - name: Upload coverage reports
      if: always()
      uses: codecov/codecov-action@v3
      with:
        files: ./coverage.xml
        flags: unittests
        name: codecov-umbrella

  lint:
    name: Lint Code
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
        cache: 'pip'
    
    - name: Install linting tools
      run: |
        python -m pip install --upgrade pip
        pip install flake8 black isort
    
    - name: Check code formatting with black
      run: black --check pipeline/src/ pipeline/tests/
    
    - name: Check import sorting with isort
      run: isort --check-only pipeline/src/ pipeline/tests/
    
    - name: Lint with flake8
      run: |
        # Stop the build if there are Python syntax errors or undefined names
        flake8 pipeline/src/ pipeline/tests/ --count --select=E9,F63,F7,F82 --show-source --statistics
        # Check style issues (non-blocking)
        flake8 pipeline/src/ pipeline/tests/ --count --max-line-length=127 --statistics || echo "Style issues found"

  dbt_test:
    name: dbt Tests
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
        cache: 'pip'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install dbt-core dbt-duckdb
    
    - name: Create DuckDB database
      run: |
        mkdir -p dbt
        touch dbt/nfl_dead_money.duckdb
    
    - name: Run dbt deps
      run: |
        cd dbt && dbt deps --project-dir . --profiles-dir .
      continue-on-error: true
    
    - name: Run dbt compile
      run: |
        cd dbt && dbt compile --project-dir . --profiles-dir .
      continue-on-error: true
    
    - name: Run dbt test
      run: |
        cd dbt && dbt test --project-dir . --profiles-dir .
      continue-on-error: true

  e2e_test:
    name: Run E2E Integration Tests (Docker)
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3
      
    - name: Run Playwright Tests
      run: |
        # Explicitly pass required environment variables to the web container
        # Run tests via the existing docker-compose.test.yml setup
        export MOTHERDUCK_TOKEN="${{ secrets.MOTHERDUCK_TOKEN }}"
        export NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY="${{ secrets.NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY }}"
        export CLERK_SECRET_KEY="${{ secrets.CLERK_SECRET_KEY }}"
        export GEMINI_API_KEY="${{ secrets.GEMINI_API_KEY }}"
        docker-compose -f docker-compose.yml -f docker-compose.test.yml --env-file /dev/null run --rm e2e
