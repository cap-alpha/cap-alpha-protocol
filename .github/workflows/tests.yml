name: Data Quality Tests

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  # Merge queue — re-runs CI on the combined state of queued PRs before landing on main
  merge_group:
    branches: [ main ]

jobs:
  test:
    name: Run Data Quality Tests
    runs-on: ubuntu-latest
    
    strategy:
      matrix:
        python-version: ['3.10', '3.11']
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v4
      with:
        python-version: ${{ matrix.python-version }}
        cache: 'pip'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r pipeline/requirements.txt
        pip install pytest pytest-cov
    
    - name: Run pytest tests
      run: |
        pytest pipeline/tests/ -v --tb=short --cov=pipeline/src --cov-report=term-missing --cov-report=xml \
          --ignore=pipeline/tests/test_api.py \
          --ignore=pipeline/tests/test_api_vegas.py
      env:
        PYTHONPATH: ${{ github.workspace }}/pipeline
    

    
    - name: Upload coverage reports
      if: always()
      uses: codecov/codecov-action@v3
      with:
        files: ./coverage.xml
        flags: unittests
        name: codecov-umbrella

  lint:
    name: Lint Code
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
        cache: 'pip'
    
    - name: Install linting tools
      run: |
        python -m pip install --upgrade pip
        pip install ruff

    - name: Lint with ruff
      run: |
        ruff check pipeline/src/ pipeline/tests/
        ruff format --check pipeline/src/ pipeline/tests/

  dbt_test:
    name: dbt Tests
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
        cache: 'pip'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install dbt-core dbt-duckdb
    
    - name: Create DuckDB database
      run: |
        mkdir -p dbt
        touch dbt/nfl_dead_money.duckdb
    
    - name: Run dbt deps
      run: |
        cd dbt && dbt deps --project-dir . --profiles-dir .
      continue-on-error: true
    
    - name: Run dbt compile
      run: |
        cd dbt && dbt compile --project-dir . --profiles-dir .
      continue-on-error: true
    
    - name: Run dbt test
      run: |
        cd dbt && dbt test --project-dir . --profiles-dir .
      continue-on-error: true

# e2e_test job removed 2026-04-26: was failing/flaky on PRs that don't touch
# web/playwright, not a required check, burned runner minutes on every push.
# To re-enable, restore from git history once the Docker setup is reliable.
