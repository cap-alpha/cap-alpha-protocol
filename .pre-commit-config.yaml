# Pre-commit hooks for NFL Dead Money project
# Install: pip install pre-commit && pre-commit install
# Run manually: pre-commit run --all-files

repos:
  # Ruff — replaces black + isort + flake8 in one fast tool
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.11
    hooks:
      - id: ruff          # lint + auto-fix safe violations
        args: [--fix]
        files: ^pipeline/
      - id: ruff-format   # format (black-compatible)
        files: ^pipeline/

  # General file hygiene
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
        exclude: \.(sql|md)$
      - id: check-yaml
      - id: check-json
      - id: check-merge-conflict
      - id: check-added-large-files
        args: [--maxkb=500]

  # Type checking (advisory, runs only when explicitly requested)
  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.15.0
    hooks:
      - id: mypy
        additional_dependencies: [pandas-stubs, types-requests, types-PyYAML]
        args: [--ignore-missing-imports, --warn-return-any]
        files: ^pipeline/src/
        stages: [manual]
