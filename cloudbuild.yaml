steps:
  - name: 'gcr.io/cloud-builders/docker'
    args: ['build', '-f', 'Dockerfile.api', '-t', 'us-central1-docker.pkg.dev/$PROJECT_ID/pundit-api/api:$COMMIT_SHA', '.']
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'us-central1-docker.pkg.dev/$PROJECT_ID/pundit-api/api:$COMMIT_SHA']
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'pundit-api'
      - '--image'
      - 'us-central1-docker.pkg.dev/$PROJECT_ID/pundit-api/api:$COMMIT_SHA'
      - '--region'
      - 'us-central1'
      - '--service-account'
      - 'pundit-api@$PROJECT_ID.iam.gserviceaccount.com'
      - '--allow-unauthenticated'
      - '--memory'
      - '1Gi'
      - '--cpu'
      - '1'
      - '--min-instances'
      - '0'
      - '--max-instances'
      - '10'
      - '--concurrency'
      - '80'
      - '--timeout'
      - '60'
      - '--set-env-vars'
      - 'GCP_PROJECT_ID=$PROJECT_ID'
images:
  - 'us-central1-docker.pkg.dev/$PROJECT_ID/pundit-api/api:$COMMIT_SHA'
