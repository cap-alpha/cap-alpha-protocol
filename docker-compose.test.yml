version: '3.8'

services:
  e2e:
    image: mcr.microsoft.com/playwright:v1.41.2-jammy
    container_name: nfl_e2e_test
    volumes:
      - ./web:/e2e
      - /e2e/node_modules
    working_dir: /e2e
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      - PLAYWRIGHT_BASE_URL=http://host.docker.internal:3000
    command: bash -c "apt-get update && apt-get install -y make g++ curl && npm install && echo 'Waiting for web server on host...' && while ! curl -s http://host.docker.internal:3000 > /dev/null; do sleep 2; done && echo 'Web server is up!' && npx playwright test tests/e2e --project=chromium"

