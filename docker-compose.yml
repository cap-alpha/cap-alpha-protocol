version: '3.8'

services:
  pipeline:
    image: python:3.11-slim
    container_name: nfl_pipeline
    volumes:
      - ./pipeline:/app/pipeline
      - ./scripts:/app/scripts
      # Native duckdb disk persistence managed inside the container
      - duckdb_volume:/app/pipeline/data/duckdb
    environment:
      - PIPELINE_YEAR=2025
      - PYTHONPATH=/app/pipeline
    working_dir: /app
    # Run apt-get and pip install on boot.
    command: >
      bash -c "apt-get update && apt-get install -y chromium chromium-driver git build-essential &&  pip install --no-cache-dir -r pipeline/requirements.txt &&  tail -f /dev/null"

  web:
    image: node:20
    container_name: nfl_web
    working_dir: /app
    ports:
      - "3000:3000"
    volumes:
      - ./web:/app
      - /app/node_modules
      - /app/.next
    environment:
      - NODE_ENV=development
      - NEXT_TELEMETRY_DISABLED=1
    command: bash -c "npm install && npm run dev"

  e2e:
    image: mcr.microsoft.com/playwright:v1.41.2-jammy
    container_name: nfl_e2e
    # Fuse network interfaces so Playwright accesses Next.js natively via localhost
    network_mode: "service:web"
    volumes:
      - ./web:/e2e
      - /e2e/node_modules
    working_dir: /e2e
    environment:
      - CI=1
    command: bash -c "apt-get update && apt-get install -y make g++ && npm install && npx playwright test"
    depends_on:
      - web

volumes:
  duckdb_volume:
