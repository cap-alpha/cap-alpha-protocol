version: '3.8'

services:
  pipeline:
    image: python:3.11-slim
    container_name: nfl_pipeline
    volumes:
      - ./pipeline:/app/pipeline
      - ./scripts:/app/scripts
      - ./.duckdb_local:/app/.duckdb_local
      - ./dbt:/app/dbt
      - ./data:/app/data
      - ~/.config/gcloud:/app/.config/gcloud:ro
    environment:
      - PIPELINE_YEAR=2025
      - PYTHONPATH=/app/pipeline
      - MOTHERDUCK_TOKEN=${MOTHERDUCK_TOKEN}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - GCP_PROJECT_ID=cap-alpha-protocol
      - GOOGLE_APPLICATION_CREDENTIALS=/app/.config/gcloud/application_default_credentials.json
    working_dir: /app
    # Run pip install on boot.
    command: >
      bash -c "pip install --no-cache-dir -r pipeline/requirements.txt && tail -f /dev/null"

  api:
    image: python:3.11-slim
    container_name: nfl_api
    ports:
      - "8000:8000"
    volumes:
      - ./pipeline:/app/pipeline
      - ~/.config/gcloud:/app/.config/gcloud:ro
    environment:
      - PYTHONPATH=/app/pipeline
      - GCP_PROJECT_ID=cap-alpha-protocol
      - GOOGLE_APPLICATION_CREDENTIALS=/app/.config/gcloud/application_default_credentials.json
    working_dir: /app
    command: >
      bash -c "pip install --no-cache-dir -r pipeline/requirements.txt &&
      uvicorn pipeline.api.main:app --host 0.0.0.0 --port 8000"

  web:
    image: node:20
    container_name: nfl_web
    working_dir: /app
    ports:
      - "3000:3000"
    volumes:
      - ./web:/app
      - /app/node_modules
      - /app/.next
    environment:
      - NODE_ENV=development
      - NEXT_TELEMETRY_DISABLED=1
    command: bash -c "npm install && npm run dev"

  e2e:
    image: mcr.microsoft.com/playwright:v1.41.2-jammy
    container_name: nfl_e2e
    # Fuse network interfaces so Playwright accesses Next.js natively via localhost
    network_mode: "service:web"
    volumes:
      - ./web:/e2e
      - /e2e/node_modules
    working_dir: /e2e
    environment:
      - CI=1
    command: bash -c "apt-get update && apt-get install -y make g++ && npm install && npx playwright test"
    depends_on:
      - web
