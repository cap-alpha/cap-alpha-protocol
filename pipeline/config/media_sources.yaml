# Media Sources Registry — Pundit Prediction Ingestion
#
# Each source defines where to fetch pundit content and how to identify it.
# The daily ingestor iterates over all enabled sources, fetches new content,
# and lands it in bronze_layer.raw_pundit_media.
#
# Adding a new source: just add an entry here. No code changes needed.
# sport field: NFL|MLB|NBA|NHL|NCAAF|NCAAB — defaults to NFL if omitted.

sources:
  # ── NFL RSS Feeds ───────────────────────────────────────────────────────────
  - id: pft_nbc
    name: "ProFootballTalk (NBC)"
    sport: "NFL"
    type: rss
    scrape_full_text: true
    url: "https://profootballtalk.nbcsports.com/feed/"
    enabled: true
    default_pundit:
      id: pft_staff
      name: "PFT Staff"
    pundits:
      - id: mike_florio
        name: "Mike Florio"
        match_authors: ["Mike Florio", "mflorio"]
      - id: josh_alper
        name: "Josh Alper"
        match_authors: ["Josh Alper"]
      - id: michael_david_smith
        name: "Michael David Smith"
        match_authors: ["Michael David Smith"]
      - id: charean_williams
        name: "Charean Williams"
        match_authors: ["Charean Williams"]
      - id: myles_simmons
        name: "Myles Simmons"
        match_authors: ["Myles Simmons"]

  - id: espn_nfl
    name: "ESPN NFL"
    sport: "NFL"
    type: rss
    scrape_full_text: true
    url: "https://www.espn.com/espn/rss/nfl/news"
    enabled: true
    default_pundit:
      id: espn_nfl_staff
      name: "ESPN NFL Staff"
    pundits:
      - id: adam_schefter
        name: "Adam Schefter"
        match_authors: ["Adam Schefter", "Schefter"]
      - id: dan_graziano
        name: "Dan Graziano"
        match_authors: ["Dan Graziano"]
      - id: jeremy_fowler
