      - id: matt_bowen
        name: "Matt Bowen"
        match_authors: ["Matt Bowen"]

  - id: theringer_nfl
    name: "The Ringer NFL"
    sport: "NFL"
    type: rss
    url: "https://www.theringer.com/rss/nfl/index.xml"
    enabled: true
    pundits:
      - id: bill_simmons
        name: "Bill Simmons"
        match_authors: ["Bill Simmons"]
      - id: kevin_clark
        name: "Kevin Clark"
        match_authors: ["Kevin Clark"]

  - id: theathletic_nfl
    name: "The Athletic NFL"
    sport: "NFL"
    type: rss
    # Disabled: ?sport=football returns all sports (soccer, NHL, NBA, tennis, cycling).
    # Re-enable once a working NFL-only feed URL is confirmed. (#128)
    url: "https://theathletic.com/feeds/rss/news/?sport=football"
    enabled: true
    default_pundit:
      id: athletic_nfl_staff
      name: "The Athletic NFL Staff"
    # Feed may include non-NFL content; keyword_filter skips entries lacking these terms
    keyword_filter:
      - "NFL"
      - "football"
      - "quarterback"
      - "touchdown"
      - "draft"
      - "free agent"
      - "trade"
      - "roster"
      - "coach"
      - "playoff"
      - "Super Bowl"
      - "AFC"
      - "NFC"
    pundits:
      - id: dianna_russini
        name: "Dianna Russini"
        match_authors: ["Dianna Russini"]
      - id: jeff_howe
        name: "Jeff Howe"
        match_authors: ["Jeff Howe"]

  - id: nfl_official
